name: Self Random Scheduler

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_ACTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip commands
        run: |
          if python -m pip show rndm > /dev/null 2>&1; then
            echo "rndm exists -> uninstalling"
            python -m pip uninstall rndm -y
          else
            echo "rndm does not exist -> installing"
            python -m pip install rndm
          fi

      - name: Rewrite workflow cron
        run: |
          NEXT_HOUR="PUT_NEXT_HOUR_HERE"
          sed -i -E 's#cron: "0 [0-9]+ \* \* \*"#cron: "0 '"$NEXT_HOUR"' * * *"#' .github/workflows/self-random.yml
          echo "Workflow updated to run at UTC hour $NEXT_HOUR"

      - name: Commit and push updated workflow
        env:
          GH_TOKEN: ${{ secrets.MY_ACTION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/self-random.yml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update next run hour manually"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
