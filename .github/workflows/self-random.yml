name: Self Random Scheduler

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create scheduler venv and install rndm
        run: |
          python -m venv .scheduler-venv
          . .scheduler-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install rndm

      - name: Generate next random hour
        id: next
        run: |
          . .scheduler-venv/bin/activate
          python - << 'EOF'
          import rndm
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).hour

          if now == 0:
              next_hour = rndm.time_based_random(1, 23)
          else:
              remaining_hours = 23 - now
              if remaining_hours <= 0:
                  next_hour = 0
              else:
                  offset = rndm.time_based_random(1, remaining_hours)
                  next_hour = now + offset

          with open("next_hour.txt", "w") as f:
              f.write(str(next_hour))

          print(f"Current UTC hour: {now}")
          print(f"Next UTC hour: {next_hour}")
          EOF

          echo "hour=$(cat next_hour.txt)" >> "$GITHUB_OUTPUT"

      - name: Run pip commands
        run: |
          if python -m pip show rndm > /dev/null 2>&1; then
            echo "rndm exists -> uninstalling"
            python -m pip uninstall rndm -y
          else
            echo "rndm does not exist -> installing"
            python -m pip install rndm
          fi

      - name: Rewrite workflow cron
        run: |
          NEXT_HOUR="${{ steps.next.outputs.hour }}"
          sed -i -E 's#cron: "0 [0-9]+ \* \* \*"#cron: "0 '"$NEXT_HOUR"' * * *"#' .github/workflows/self-random.yml
          echo "Workflow updated to run at UTC hour $NEXT_HOUR"

      - name: Commit and push updated workflow
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/self-random.yml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update next run hour to ${{ steps.next.outputs.hour }} UTC"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
